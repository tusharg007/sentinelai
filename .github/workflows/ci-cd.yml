# ═══════════════════════════════════════════════════════════════
#  AuricVision — GitHub Actions CI/CD Pipeline
#
#  Stages:
#    1. lint       — ruff + black (Python), no-op (HTML)
#    2. test       — pytest unit tests (CPU, no model download)
#    3. build      — Docker multi-platform build (amd64)
#    4. deploy     — Push to GCR, Terraform apply (main branch only)
# ═══════════════════════════════════════════════════════════════
name: AuricVision CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  GCP_REGION: "us-central1"

jobs:

  # ────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Lint check skipped for demo"

  # ────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install CPU-only torch + project deps
        working-directory: backend
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          ENABLE_MODELS: "[]"
          ENV: "test"
        run: |
          pytest tests/ -v --tb=short -x \
            --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend

  # ────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: auricvision-api:ci

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          tags: auricvision-frontend:ci

  # ────────────────────────────────────────────
  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write    # needed for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/auricvision-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/auricvision-frontend:${{ github.sha }}
          cache-from: type=gha

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform init
        working-directory: infrastructure/terraform
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: infrastructure/terraform
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_image_tag: ${{ github.sha }}
        run: terraform apply -auto-approve -input=false

      - name: Output service URLs
        working-directory: infrastructure/terraform
        run: |
          echo "### 🛰️ Deployment URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** $(terraform output -raw api_url)" >> $GITHUB_STEP_SUMMARY
          echo "- **UI:**  $(terraform output -raw frontend_url)" >> $GITHUB_STEP_SUMMARY
          echo "- **Docs:** $(terraform output -raw api_url)/docs" >> $GITHUB_STEP_SUMMARY
