apiVersion: apps/v1
kind: Deployment
metadata:
  name: auricvision-frontend
  namespace: auricvision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auricvision
      component: frontend
  template:
    metadata:
      labels:
        app: auricvision
        component: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/YOUR_PROJECT/auricvision-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: auricvision-frontend
  namespace: auricvision
spec:
  selector:
    app: auricvision
    component: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
