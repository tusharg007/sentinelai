apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auricvision-ingress
  namespace: auricvision
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "auricvision-ip"
    networking.gke.io/managed-certificates: "auricvision-cert"
spec:
  rules:
    - host: auricvision.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: auricvision-api
                port: { number: 80 }
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: auricvision-api
                port: { number: 80 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auricvision-frontend
                port: { number: 80 }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auricvision-model-cache
  namespace: auricvision
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
