# ─────────────────────────────────────────────────────────────────────────────
#  AuricVision API — Kubernetes Deployment
#  Suitable for GKE, EKS, or AKS with GPU node pools
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auricvision-api
  namespace: auricvision
  labels:
    app: auricvision
    component: api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auricvision
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auricvision
        component: api
    spec:
      serviceAccountName: auricvision
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: gcr.io/YOUR_PROJECT/auricvision-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ENV
              value: "production"
            - name: DEVICE
              value: "auto"
            - name: ENABLE_MODELS
              valueFrom:
                configMapKeyRef:
                  name: auricvision-config
                  key: ENABLE_MODELS
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auricvision-secrets
                  key: SECRET_KEY
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /app/.cache
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: auricvision-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: auricvision-api
  namespace: auricvision
spec:
  selector:
    app: auricvision
    component: api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auricvision-api-hpa
  namespace: auricvision
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auricvision-api
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
